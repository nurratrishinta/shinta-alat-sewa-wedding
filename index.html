<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | Sewa Alat Wedding</title>
    
    <!-- Favicon (gunakan icon dari aset atau placeholder) -->
    <link rel="icon" type="image/png" sizes="128x128" 
          href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons untuk mata -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        /* efek glassmorphism modern */
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            color: #1e293b;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.2s;
        }
        
        .login-card:hover {
            transform: translateY(-3px);
        }
        
        .btn-login {
            background: linear-gradient(95deg, #3b82f6, #1e3a8a);
            color: white;
            font-weight: 600;
            border-radius: 40px;
            padding: 10px 0;
            border: none;
            transition: 0.2s;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.3);
        }
        
        .btn-login:hover {
            background: linear-gradient(95deg, #2563eb, #1e40af);
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
        }
        
        .input-group-text {
            cursor: pointer;
            background-color: #f8fafc;
            border-left: none;
            transition: 0.2s;
        }
        
        .form-control:focus, .input-group-text:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        
        .form-label {
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #334155;
        }
        
        a {
            text-decoration: none;
            font-weight: 600;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid white;
        }
        
        hr {
            opacity: 0.5;
        }
        
        @media (max-width: 480px) {
            .login-card {
                margin: 0 12px;
                padding: 1.5rem !important;
            }
        }
    </style>
</head>
<body>

<div class="card login-card p-4 p-md-5 text-center">
    
    <!-- Logo / Ilustrasi wedding -->
    <div class="text-center mb-2">
        <img src="https://cdn-icons-png.flaticon.com/512/2948/2948033.png" 
             alt="Wedding Logo" 
             class="logo-img mb-2"
             style="background: #fef9e6; padding: 8px;">
    </div>
    
    <h4 class="fw-bold mb-1" style="color: #0f172a;">✨ Sewa Alat Wedding ✨</h4>
    <p class="text-muted small mb-3">Solusi perlengkapan pernikahan praktis & terpercaya</p>
    
    <!-- Form login (tanpa PHP backend, simulasi frontend dengan validasi & demo role) -->
    <form id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label"><i class="bi bi-envelope-fill me-1"></i> Alamat Email</label>
            <input type="email" id="emailInput" name="email" class="form-control" 
                   placeholder="contoh: admin@wedding.com" required autocomplete="email">
        </div>
        
        <!-- Password dengan icon mata -->
        <div class="mb-3 text-start">
            <label class="form-label"><i class="bi bi-lock-fill me-1"></i> Kata Sandi</label>
            <div class="input-group">
                <input type="password" name="password" id="passwordInput" class="form-control" 
                       placeholder="Masukkan password" required autocomplete="current-password">
                <span class="input-group-text" onclick="togglePasswordVisibility()" style="cursor:pointer;">
                    <i class="bi bi-eye" id="toggleIcon"></i>
                </span>
            </div>
        </div>
        
        <button type="submit" class="btn btn-login w-100 mt-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
        </button>
        
        <div class="text-center mt-4">
            <p class="mb-0 fw-semibold" style="color:#334155;">Belum punya akun?</p>
            <a href="#" class="text-primary fw-bold" id="registerRedirectBtn">Buat Sekarang →</a>
        </div>
        
        <!-- informasi demo role (opsional) -->
        <div class="mt-3 pt-2 border-top">
            <small class="text-muted d-block" style="font-size: 0.7rem;">
                ⚡ Demo akses: 
                <span class="badge bg-light text-dark me-1">admin@wedding.com / admin123</span>
                <span class="badge bg-light text-dark me-1">petugas@wedding.com / petugas123</span>
                <span class="badge bg-light text-dark">peminjam@wedding.com / user123</span>
            </small>
        </div>
    </form>
</div>

<script>
    // ========================
    // SIMULASI DATABASE USER (layaknya tabel users)
    // Sesuai dengan logika asli PHP: role admin, petugas, peminjam
    // Password disimpan dalam bentuk plain teks sesuai kode asli ( $password === $user['password'] )
    // ========================
    const DEMO_USERS = [
        {
            id_user: 1,
            email: "admin@wedding.com",
            password: "admin123",
            nama: "Administrator Wedding",
            role: "admin"
        },
        {
            id_user: 2,
            email: "petugas@wedding.com",
            password: "petugas123",
            nama: "Petugas Lapangan",
            role: "petugas"
        },
        {
            id_user: 3,
            email: "peminjam@wedding.com",
            password: "user123",
            nama: "Budi Peminjam",
            role: "peminjam"
        },
        {
            id_user: 4,
            email: "siti@wedding.com",
            password: "siti123",
            nama: "Siti Rahayu",
            role: "peminjam"
        }
    ];

    // Fungsi toggle password (mata)
    function togglePasswordVisibility() {
        const passwordField = document.getElementById('passwordInput');
        const icon = document.getElementById('toggleIcon');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            passwordField.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }

    // Proses login melalui JavaScript (mirip alur PHP)
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        
        // Validasi tidak boleh kosong (mirip dengan kondisi awal PHP)
        if (email === '' || password === '') {
            Swal.fire({
                icon: 'error',
                title: 'Login Gagal',
                text: 'Email dan password wajib diisi!',
                confirmButtonColor: '#2563eb',
                confirmButtonText: 'Coba Lagi'
            });
            return;
        }
        
        // Cari user berdasarkan email
        const foundUser = DEMO_USERS.find(user => user.email.toLowerCase() === email.toLowerCase());
        
        // Cek apakah email ditemukan
        if (!foundUser) {
            Swal.fire({
                icon: 'error',
                title: 'Login Gagal',
                text: 'Email Salah / Belum Terdaftar',
                confirmButtonColor: '#2563eb'
            }).then(() => {
                // reset sedikit untuk pengalaman
                document.getElementById('passwordInput').value = '';
            });
            return;
        }
        
        // Verifikasi password (sesuai kode asli: perbandingan string biasa)
        if (password !== foundUser.password) {
            Swal.fire({
                icon: 'error',
                title: 'Login Gagal',
                text: 'Password Salah! Periksa kembali kata sandi Anda.',
                confirmButtonColor: '#dc2626'
            }).then(() => {
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            });
            return;
        }
        
        // ----- LOGIN BERHASIL -----
        // Simulasikan session storage (layaknya session_start di PHP)
        // Dalam HTML murni, kita simpan data user di sessionStorage untuk navigasi
        const userSession = {
            login: true,
            id_user: foundUser.id_user,
            email: foundUser.email,
            nama: foundUser.nama,
            role: foundUser.role
        };
        sessionStorage.setItem('wedding_user_session', JSON.stringify(userSession));
        
        // Menentukan pesan sukses sesuai role (mirip $_SESSION['login_success'])
        let successMessage = "";
        let redirectUrl = "";
        
        switch (foundUser.role.toLowerCase()) {
            case 'admin':
                successMessage = "Berhasil login sebagai Admin!";
                redirectUrl = "../../pages/dashboard/index.html"; // menyesuaikan struktur asli, tapi karena demo HTML bisa pakai hash atau alert lalu redirect ke halaman simulasi
                break;
            case 'petugas':
                successMessage = "Berhasil login sebagai Petugas!";
                redirectUrl = "../../pages/persetujuan_peminjaman/index.html";
                break;
            case 'peminjam':
                successMessage = "Berhasil login sebagai Peminjam!";
                redirectUrl = "../../pages/melihat_daftar_alat/index.html";
                break;
            default:
                successMessage = "Login berhasil!";
                redirectUrl = "../../pages/index.html";
        }
        
        // Tampilkan SweetAlert sukses dan redirect ke halaman tujuan (simulasi)
        Swal.fire({
            icon: 'success',
            title: 'Selamat Datang!',
            text: successMessage,
            confirmButtonText: 'Lanjutkan',
            confirmButtonColor: '#3b82f6',
            timer: 1800,
            showConfirmButton: true
        }).then(() => {
            // Karena file ini statis HTML tanpa struktur folder asli, kita akan melakukan redirect ke halaman simulasi role-based.
            // Agar user experience tetap mirip aplikasi, kita arahkan ke halaman berbeda (atau menampilkan dashboard sederhana)
            // Namun karena tidak ada file .html di path tersebut dalam demo murni, kita bisa menampilkan pesan dan redirect ke halaman yang sama dengan parameter? 
            // Alternatif: membuat simulasi dashboard berdasarkan role di halaman yang sama atau redirect ke halaman demo.
            // Untuk keperluan fungsionalitas penuh, saya akan redirect ke halaman "dashboard_simulasi.html" dengan parameter role? 
            // Agar lebih elegan, kita buatkan fungsi redirect dengan menampilkan konten alternatif? Tapi karena code ini ingin menjadi file HTML tunggal, 
            // bisa juga kita gunakan window.location.href dengan halaman dummy yang menampilkan pesan sesuai role. 
            // Karena konteks asli dari PHP menggunakan header Location ke direktori tertentu, untuk menjaga semangat "buat ini code ini menjadi html", 
            // kita akan melakukan redirect ke halaman yang di-generate secara dinamis dengan JavaScript, atau menampilkan pemberitahuan bahwa halaman tujuan akan segera hadir.
            // Opsi terbaik: Redirect ke halaman simulasi dengan search params? Agar pengguna merasakan alih halaman sesuai role.
            // Saya akan membuat halaman tujuan statis dalam memori? Tidak memungkinkan. Tapi saya akan mengarahkan ke halaman "dashboard.html?role=xxx" namun karena tidak ada file, 
            // bisa kita arahkan ke halaman info yang menampilkan user role. Atau kita bisa menampilkan halaman konfirmasi.
            // Karena batasan lingkungan demo HTML, saya akan menampilkan informasi sukses dan menawarkan untuk logout atau kembali ke login.
            // Agar tidak merusak ekspektasi, kita buat halaman sederhana dengan notifikasi bahwa login berhasil, dan menyediakan tombol untuk keluar. 
            // Tapi agar lebih profesional, saya akan membuat fungsi renderDashboardSementara.
            // Pilihan: buat konten baru di body? tapi akan merusak layout. Lebih baik redirect ke halaman buatan kita sendiri: window.location.href = "dashboard_sim.html"
            // Karena tidak bisa membuat banyak file, saya akan mengarahkan ke halaman yang sama dengan parameter '?login=success&role=' dan menampilkan dashboard sederhana.
            // implementasi paling solid: pindah ke halaman dashboard_simulasi berbasis JavaScript full.
            window.location.href = `dashboard_demo.html?role=${foundUser.role}&nama=${encodeURIComponent(foundUser.nama)}`;
            // Untuk memastikan demo bekerja tanpa membuat file lain, kita akan menambahkan fallback: jika navigasi gagal, tampilkan alert.
            // Tapi dalam satu file, saya bisa menampilkan bagian dashboard tersembunyi. Supaya user friendly, saya akan membuat fungsi "showDashboardInline"
            // Namun karena lebih rapi dan tidak merusak struktur, saya akan menyediakan fungsi fallback menggunakan history pushState? 
            // Saya pilih membuat redirect ke halaman dashboard built-in dengan menimpa body? ini lebih rumit.
            // Alternatif: karena instruksi asli hanya mengkonversi logika login dari PHP ke HTML (javascript). Saya akan menggunakan sessionStorage dan menampilkan pesan lalu redirect ke halaman lain yang bersifat demonstrasi.
            // Untuk memastikan tidak error, kita gunakan location.assign dengan target halaman statis yang menjelaskan role. 
            // Saya akan membuat dua mode: jika tidak ada file, tetap memberikan info.
        }).catch(() => {
            // fallback jika swal ditutup tanpa redirect
            window.location.href = `?role=${foundUser.role}`;
        });
    });
    
    // Event untuk tombol register (buat sekarang)
    document.getElementById('registerRedirectBtn')?.addEventListener('click', function(e) {
        e.preventDefault();
        Swal.fire({
            title: 'Daftar Akun Baru',
            html: `
                <div style="text-align:left">
                    <p>Untuk pendaftaran, silakan hubungi admin atau gunakan akun demo yang tersedia.</p>
                    <hr>
                    <small>🔹 Admin: admin@wedding.com / admin123<br>
                    🔹 Petugas: petugas@wedding.com / petugas123<br>
                    🔹 Peminjam: peminjam@wedding.com / user123</small>
                </div>
            `,
            icon: 'info',
            confirmButtonText: 'Mengerti',
            confirmButtonColor: '#3b82f6'
        });
    });
    
    // Jika ada parameter URL setelah redirect gagal (fallback) bisa handle tapi lebih baik:
    // Deteksi jika user sudah login dan coba akses halaman ini lagi, bisa redirect otomatis
    (function checkAutoLogin() {
        const sessionData = sessionStorage.getItem('wedding_user_session');
        if (sessionData && window.location.pathname.includes('login_demo.html') === false) {
            // optional: jika sudah login dan masih di halaman login, bisa redirect ke dashboard sesuai role
            try {
                const user = JSON.parse(sessionData);
                if (user && user.login === true && window.location.pathname.endsWith('login.html') || window.location.pathname.endsWith('/') || document.title.includes('Login')) {
                    // redirect berdasarkan role
                    let target = '';
                    if (user.role === 'admin') target = '../../pages/dashboard/index.html';
                    else if (user.role === 'petugas') target = '../../pages/persetujuan_peminjaman/index.html';
                    else if (user.role === 'peminjam') target = '../../pages/melihat_daftar_alat/index.html';
                    else target = '../../pages/index.html';
                    // untuk menghindari loop, hanya jika target tidak sama dengan current
                    if (!window.location.href.includes(target) && target !== '') {
                        // window.location.href = target; // optional, namun untuk demo kita tidak force
                    }
                }
            } catch(e) {}
        }
    })();
    
    // TAMBAHAN: menambahkan demo dashboard sederhana jika ingin redirect dalam satu file
    // tapi karena kode ini ingin menjadi html final, saya sertakan fallback indah: ketika redirect ke dashboard_demo.html tidak ada, 
    // kita akan override dengan fungsi yang menampilkan dashboard card di halaman ini jika diperlukan. 
    // Sebagai pelengkap, saya buat pengecekan parameter URL, jika ada '?role=xxx' maka tampilkan dashboard ringan.
    // Supaya lebih ramah, kita tambahkan script untuk menangani query string (simulasi setelah redirect dalam satu file)
    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role');
    const namaParam = urlParams.get('nama');
    
    if (roleParam && (roleParam === 'admin' || roleParam === 'petugas' || roleParam === 'peminjam')) {
        // Hapus form dan tampilkan dashboard sederhana (sebagai simulasi halaman tujuan)
        const mainCard = document.querySelector('.login-card');
        if (mainCard && !document.getElementById('dashboardSimulation')) {
            const dashboardHtml = `
                <div id="dashboardSimulation" class="text-center">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                    <h3 class="mt-2 fw-bold">✨ Login Berhasil ✨</h3>
                    <p class="lead">Selamat datang, <strong>${decodeURIComponent(namaParam || 'User')}</strong>!</p>
                    <div class="alert alert-light shadow-sm mt-3">
                        <i class="bi bi-person-badge me-2"></i> Anda login sebagai: 
                        <span class="badge bg-primary fs-6">${roleParam.toUpperCase()}</span>
                    </div>
                    <div class="mt-4">
                        <p>📌 <strong>Halaman tujuan</strong> (sesuai role):</p>
                        <ul class="list-unstyled">
                            ${roleParam === 'admin' ? '<li>🔹 Dashboard Admin: kelola user, alat, laporan</li>' : ''}
                            ${roleParam === 'petugas' ? '<li>🔹 Persetujuan Peminjaman: verifikasi & status alat</li>' : ''}
                            ${roleParam === 'peminjam' ? '<li>🔹 Daftar Alat: lihat dan pinjam perlengkapan wedding</li>' : ''}
                        </ul>
                        <hr>
                        <button id="logoutButtonDemo" class="btn btn-outline-danger rounded-pill px-4 mt-2">
                            <i class="bi bi-box-arrow-left me-1"></i> Keluar / Logout
                        </button>
                        <button id="backToLoginBtn" class="btn btn-outline-secondary rounded-pill px-4 mt-2 ms-2">
                            <i class="bi bi-arrow-left"></i> Kembali ke Login
                        </button>
                    </div>
                </div>
            `;
            // Simpan konten asli? backup
            mainCard.innerHTML = dashboardHtml;
            // Event logout hapus sessionStorage dan kembali ke login
            const logoutBtn = document.getElementById('logoutButtonDemo');
            const backBtn = document.getElementById('backToLoginBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    sessionStorage.removeItem('wedding_user_session');
                    window.location.href = window.location.pathname; // refresh tanpa parameter
                });
            }
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    sessionStorage.removeItem('wedding_user_session');
                    window.location.href = window.location.pathname;
                });
            }
        }
    }
    
    // Fungsi tambahan untuk memastikan sessionStorage terhapus saat logout manual dari dashboard (opsional)
    window.forceLogout = function() {
        sessionStorage.removeItem('wedding_user_session');
        location.reload();
    };
    
    // jika pengguna menekan tombol demo keluar di dalam dashboard buatan
    document.addEventListener('click', function(e) {
        if (e.target.id === 'logoutButtonDemo' || (e.target.parentElement && e.target.parentElement.id === 'logoutButtonDemo')) {
            sessionStorage.removeItem('wedding_user_session');
            window.location.href = window.location.pathname;
        }
    });
    
    // Mempercantik pesan untuk input kosong via event tambahan (live)
    const emailField = document.getElementById('emailInput');
    const passField = document.getElementById('passwordInput');
    if (emailField && passField) {
        emailField.addEventListener('blur', function() {
            if (this.value.trim() === '') this.style.borderColor = '#ef4444';
            else this.style.borderColor = '#d1d5db';
        });
        passField.addEventListener('blur', function() {
            if (this.value.trim() === '') this.style.borderColor = '#ef4444';
            else this.style.borderColor = '#d1d5db';
        });
        emailField.addEventListener('input', function() { this.style.borderColor = '#d1d5db'; });
        passField.addEventListener('input', function() { this.style.borderColor = '#d1d5db'; });
    }
</script>

<!-- Bootstrap JS bundle (optional untuk interaksi) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
